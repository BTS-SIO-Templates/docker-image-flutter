name: Build and Publish Flutter Image

on:
  push:
    branches: [main, master]
    paths: ['Dockerfile']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # On force le passage en minuscules de l'organisation et du dépôt
          tags: |
            ghcr.io/${{ github.repository_owner_lowercase }}/${{ github.event.repository.name }}:latest
        env:
          # On crée une variable temporaire en minuscules pour l'organisation
          GITHUB_REPOSITORY_OWNER_LOWERCASE: ${{ github.repository_owner }}
